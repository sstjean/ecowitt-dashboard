# Mock Ecowitt gateway: serves a fixed, real-shaped get_livedata_info payload so
# the poller's full ingest pipeline runs when the real gateway is unreachable
# (off-LAN local testing only — not part of the production stack).
server {
    listen 80;
    server_name _;

    location = /get_livedata_info {
        default_type application/json;
        alias /usr/share/nginx/html/livedata.json;
    }

    # get_sensors_info is paged (?page=1|2); serve each captured page. Defaults
    # to page 1 when the query arg is absent.
    location = /get_sensors_info {
        default_type application/json;
        set $spage $arg_page;
        if ($spage = "") { set $spage "1"; }
        root /usr/share/nginx/html;
        try_files /sensors_page_$spage.json =404;
    }

    location / {
        return 404;
    }
}
