name: CI

on:
  push:
    branches: [main, "001-live-dashboard"]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      # npm 10.x drops platform-specific optional deps (rolldown native binding)
      # on `npm ci` — npm/cli#4828. npm 11 installs them correctly.
      - run: npm install -g npm@11
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test:coverage

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      # npm 10.x drops platform-specific optional deps (rolldown native binding)
      # on `npm ci` — npm/cli#4828. npm 11 installs them correctly.
      - run: npm install -g npm@11
      - run: npm ci
      - run: npx playwright install --with-deps chromium
        working-directory: apps/web
      - run: npm run test:e2e -w @ecowitt/web

  kiosk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck + bats
        run: sudo apt-get update && sudo apt-get install -y shellcheck bats
      - name: Lint scripts and run bats helper suite
        run: npm run test:kiosk

  watchdog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck + bats + coverage
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck bats
          python3 -m pip install --user coverage
      - name: Lint + bats + python unittest @ 100% coverage
        run: npm run test:watchdog

