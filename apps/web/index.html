<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Weather</title>
    <link rel="stylesheet" href="/src/styles.css" />
    <!-- PWA install layer (Feature 015 — edge file, no shared src/ changes).
         Service-worker-free: iOS "Add to Home Screen" + standalone launch works
         over LAN HTTP without a service worker (which would require HTTPS). -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#3d3b3a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Weather" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
  </head>
  <body>
    <div id="app">
      <main class="stage">
        <div class="col col-left">
          <section class="card" data-panel="outdoor">
            <h3>Outdoors</h3>
            <div class="out-gauges">
              <div class="gauge" data-ring="outdoor"></div>
              <div data-ring="feels"></div>
              <div class="gauge" data-ring="wind"></div>
            </div>
            <div class="out-metrics" data-metrics="out"></div>
          </section>
          <section class="card solar" data-panel="solar"></section>
        </div>
        <div class="col col-right">
          <section class="card" data-panel="indoor"></section>
          <section class="card rain" data-panel="rain"></section>
          <section class="card baro" data-panel="baro"></section>
        </div>
      </main>
    </div>
    <script type="module" src="/src/bootstrap.ts"></script>
  </body>
</html>
