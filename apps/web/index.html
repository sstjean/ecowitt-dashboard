<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Weather</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="app">
      <header class="app-header">
        <h1 class="app-title">Live Weather</h1>
        <div class="app-clock">
          <span class="header-date" data-header-date></span>
          <span class="header-time" data-header-time></span>
        </div>
      </header>
      <main class="panel-grid">
        <section class="panel panel-primary" data-panel="outdoor"></section>
        <section class="panel panel-secondary" data-panel="conditions"></section>
      </main>
    </div>
    <script type="module" src="/src/bootstrap.ts"></script>
  </body>
</html>
