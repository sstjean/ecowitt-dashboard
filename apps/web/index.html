<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Weather</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="app">
      <main class="stage">
        <div class="col col-left">
          <section class="card" data-panel="outdoor">
            <h3>Outdoors</h3>
            <div class="out-gauges">
              <div class="gauge" data-ring="outdoor"></div>
              <div data-ring="feels"></div>
              <div class="gauge" data-ring="wind"></div>
            </div>
          </section>
          <section class="card solar" data-panel="solar"></section>
        </div>
        <div class="col col-right">
          <section class="card rain" data-panel="rain"></section>
          <section class="card" data-panel="conditions"></section>
        </div>
      </main>
    </div>
    <script type="module" src="/src/bootstrap.ts"></script>
  </body>
</html>
