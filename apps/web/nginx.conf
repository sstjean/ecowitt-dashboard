# nginx config for the web container: serve the static SPA and reverse-proxy the
# versioned API to the `api` service on the compose network (FR-036 — the client
# only ever speaks to /api/v1, never the store or gateway directly).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Versioned API -> api service (Fastify listens on 8080 in production).
    location /api/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # PWA manifest must be served with the correct content type so browsers
    # honor it (Feature 015 / FR-006). nginx's default mime map does not know
    # the .webmanifest extension and would otherwise send application/octet-stream.
    location = /manifest.webmanifest {
        default_type application/manifest+json;
        try_files $uri =404;
    }

    # Static assets + SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
